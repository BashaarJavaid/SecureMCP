# Scrapes over the compose-internal network only — 9100/9101 are not published
# to the host (ARCHITECTURE.md §7: unauthenticated-but-internal posture).
global:
  scrape_interval: 15s

scrape_configs:
  - job_name: gateway
    static_configs:
      - targets: ["gateway:9100"]
  - job_name: verifier
    static_configs:
      - targets: ["verifier:9101"]
