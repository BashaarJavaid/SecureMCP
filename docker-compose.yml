services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-securmcp}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-securmcp}
      POSTGRES_DB: ${POSTGRES_DB:-securmcp}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-securmcp} -d ${POSTGRES_DB:-securmcp}"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  gateway:
    build: .
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://securmcp:securmcp@postgres:5432/securmcp}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      # UPSTREAM_COMMAND: set when sample_target lands (ROADMAP Phase 1, item 8),
      # e.g. "python sample_target/overscoped_server.py"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # sample_target demo servers land with ROADMAP Phase 1 item 8 / Phase 2 item 14:
  # overscoped_server:
  #   ...
  # rogue_server:
  #   ...

volumes:
  pgdata:
