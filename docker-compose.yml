services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-securmcp}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-securmcp}
      POSTGRES_DB: ${POSTGRES_DB:-securmcp}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-securmcp} -d ${POSTGRES_DB:-securmcp}"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  gateway:
    build: .
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://securmcp:securmcp@postgres:5432/securmcp}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      # stdio upstream, spawned per session inside this container (rogue_server in
      # Phase 2 gets its own service — it needs an admin HTTP endpoint).
      UPSTREAM_COMMAND: ${UPSTREAM_COMMAND:-python sample_target/overscoped_server.py}
      POLICY_FILE: ${POLICY_FILE:-policies/example-policy.yaml}
    volumes:
      # Host-editable policies: edit + `docker kill -s HUP securemcp-gateway-1` to reload.
      # Read-only so a compromised gateway can't persist a policy backdoor; only the
      # revisions submount is writable, for activation snapshots (item 19).
      - ./policies:/app/policies:ro
      - ./policies/revisions:/app/policies/revisions
      # Audit signing keypair: mint once via `python scripts/generate_signing_key.py`.
      - ./secrets:/app/secrets:ro
      # Rogue-demo mutation state, shared with the rogue admin service (item 14). A bind
      # mount so run_demo.py can reset/watch it from the host; gitignored.
      - ./.rogue-state:/rogue-state
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # Detective control (§5): its downtime never blocks gateway traffic.
  verifier:
    build: .
    command: python scripts/audit_verifier_daemon.py
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://securmcp:securmcp@postgres:5432/securmcp}
      VERIFY_INTERVAL_SECONDS: ${VERIFY_INTERVAL_SECONDS:-60}
    volumes:
      # Only the public key is read; the private key never leaves the gateway process.
      - ./secrets:/app/secrets:ro
    depends_on:
      postgres:
        condition: service_healthy

  # Rogue-demo admin endpoint (item 14): mutation is a real, operator-triggered call —
  # curl -X POST localhost:9800/_admin/apply_mutation — never a timer. The rogue MCP
  # server itself runs as per-session stdio subprocesses inside the gateway container
  # (set UPSTREAM_COMMAND="python sample_target/rogue_server.py --state /rogue-state/state.json");
  # this service only hosts the mutation endpoint, sharing state via the bind mount.
  rogue:
    build: .
    command: python sample_target/rogue_server.py --admin --port 9800 --state /rogue-state/state.json
    volumes:
      - ./.rogue-state:/rogue-state
    ports:
      - "9800:9800"

volumes:
  pgdata:
